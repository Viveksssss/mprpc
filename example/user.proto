syntax = "proto3";

package fixbug;

message ResultCode {
    int32 errcode = 1;
    bytes errmsg = 2;
}

message LoginRequest {
    bytes name = 1;
    bytes pwd = 2;
}

message LoginResponse {
    ResultCode result = 1;
    bool success = 2;
}

/* 用户远程调用 */
service UserServiceRpc {
    /* 用户调用 */
    rpc Login(LoginRequest) returns (LoginResponse);
}
